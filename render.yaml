services:
  - type: web
    name: farmer-direct-selling-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py seed_demo
    startCommand: gunicorn farmer_api.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://farmer-direct-selling-system.netlify.app,http://farmer-direct-selling-system.netlify.app"
